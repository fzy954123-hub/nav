<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>百川导航 - 海纳百川，尽收于此</title>
<meta name="referrer" content="no-referrer">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://cdn.bootcdn.net; font-src 'self' https://cdn.bootcdn.net data:; script-src 'self' 'unsafe-inline'; img-src 'self' data: https:; frame-ancestors 'none';">
<meta http-equiv="X-Frame-Options" content="DENY">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌊</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#0a0e14 0%,#131920 40%,#0d1117 100%);
  font-family:"Microsoft YaHei","PingFang SC",sans-serif;color:#fff;
  overflow-x:hidden;
}
.bg-particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.container{position:relative;z-index:1;text-align:center;padding:20px}
h1{font-size:48px;font-weight:800;margin-bottom:8px}
h1 span{background:linear-gradient(135deg,#00d4ff,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{color:#556;font-size:16px;margin-bottom:60px}
.doors{display:flex;gap:30px;justify-content:center;flex-wrap:wrap}
.door{
  display:block;width:260px;height:340px;border-radius:20px;
  text-decoration:none;position:relative;overflow:hidden;
  transition:transform .3s,box-shadow .3s;cursor:pointer;
}
.door:hover{transform:translateY(-8px)}
.door-a{
  background:linear-gradient(160deg,rgba(0,212,255,.15),rgba(0,180,220,.08));
  border:1px solid rgba(0,212,255,.2);box-shadow:0 0 40px rgba(0,212,255,.1);
}
.door-a:hover{box-shadow:0 0 60px rgba(0,212,255,.25)}
.door-b{
  background:linear-gradient(160deg,rgba(124,58,237,.15),rgba(100,30,200,.08));
  border:1px solid rgba(124,58,237,.2);box-shadow:0 0 40px rgba(124,58,237,.1);
}
.door-b:hover{box-shadow:0 0 60px rgba(124,58,237,.25)}
.door .icon{font-size:72px;margin:60px 0 20px;display:block}
.door .title{font-size:24px;font-weight:700;color:#fff;margin-bottom:8px}
.door .desc{font-size:13px;color:#667788;padding:0 20px;line-height:1.5}
.door .badge{
  display:inline-block;padding:4px 14px;border-radius:20px;
  font-size:12px;margin-top:16px;
}
.door-a .badge{background:rgba(0,212,255,.15);color:#00d4ff}
.door-b .badge{background:rgba(124,58,237,.15);color:#a78bfa}
.footer{position:fixed;bottom:30px;left:0;right:0;text-align:center;color:#333;font-size:13px;z-index:1}
@media(max-width:600px){
  h1{font-size:32px}
  .doors{gap:20px}
  .door{width:220px;height:300px}
  .door .icon{font-size:56px;margin:50px 0 15px}
  .door .title{font-size:20px}
}
/* 实时时钟 */
.banner-clock{
  position:absolute;right:20px;top:50%;transform:translateY(-50%);
  text-align:right;line-height:1.4;z-index:2;
}
.banner-clock .clock-date{
  color:#00d4ff;font-size:16px;font-weight:600;
}
.banner-clock .clock-time{
  color:#00d4ff;font-size:28px;font-weight:800;
  font-family:"Consolas","Monaco",monospace;
  text-shadow:0 0 20px rgba(0,212,255,.3);
}
</style>
</head>
<body>

<canvas class="bg-particles" id="bg"></canvas>

<div class="container">
  <div class="banner-clock">
    <div class="clock-date" id="clockDate"></div>
    <div class="clock-time" id="clockTime"></div>
  </div>
  <h1>海纳百川 · <span>尽收于此</span></h1>
  <p class="sub">选择一个入口开始探索</p>

  <div class="doors">
    <a class="door door-a" href="nav.html">
      <span class="icon">🌊</span>
      <div class="title">百川导航</div>
      <div class="desc">短视频 / 影视 / 音乐 / 短剧 / 游戏 / 工具</div>
      <span class="badge">娱乐 · 工具</span>
    </a>

    <a class="door door-b" href="bookmarks.html">
      <span class="icon">📚</span>
      <div class="title">技术收藏</div>
      <div class="desc">嵌入式学习 / 硬件设计 / USB协议 / AI工具</div>
      <span class="badge">开发 · 学习</span>
    </a>
  </div>
</div>

<div class="footer">🌊 百川导航</div>

<script>
(function(){
  var c=document.getElementById("bg"),ctx=c.getContext("2d"),w,h,pts=[];
  function resize(){w=c.width=window.innerWidth;h=c.height=window.innerHeight}
  resize();window.onresize=resize;
  for(var i=0;i<50;i++)pts.push({x:Math.random()*w,y:Math.random()*h,r:.3+Math.random()*1.2,s:.2+Math.random()*.4});
  function draw(){
    ctx.clearRect(0,0,w,h);
    for(var i=0;i<pts.length;i++){
      var p=pts[i];ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle="rgba(0,212,255,"+(.08+Math.sin(Date.now()*.001+i)*.04)+")";ctx.fill();
      p.y-=p.s;if(p.y<-10){p.y=h+10;p.x=Math.random()*w}
    }
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
<script>
function updateClock(){
  var now = new Date();
  var y = now.getFullYear();
  var mo = (now.getMonth()+1).toString().padStart(2,"0");
  var d = now.getDate().toString().padStart(2,"0");
  var wds = ["日","一","二","三","四","五","六"];
  var wd = "星期" + wds[now.getDay()];
  var h = now.getHours().toString().padStart(2,"0");
  var m = now.getMinutes().toString().padStart(2,"0");
  var s = now.getSeconds().toString().padStart(2,"0");
  var elD = document.getElementById("clockDate");
  var elT = document.getElementById("clockTime");
  if(elD) elD.textContent = y + "-" + mo + "-" + d + " " + wd;
  if(elT) elT.textContent = h + ":" + m + ":" + s;
}
updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
