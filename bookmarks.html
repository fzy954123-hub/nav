var COLORS = ["red", "orange", "green", "pink", "blue", "purple", "yellow"];

function renderFolders(){
  document.getElementById('folders').style.display='block';
  document.getElementById('detail').style.display='none';
  document.getElementById('backBtn').classList.remove('show');
  document.getElementById('crumb').textContent='';
  var grid = document.getElementById('folderGrid');
  grid.innerHTML = '';
  DATA.forEach(function(f, i){
    var color = COLORS[i % COLORS.length];
    var count = f.items.length;
    if (f.subs.length > 0) count += ' +' + f.subs.length + '子';
    grid.innerHTML += '<div class="card" onclick="openFolder(' + i + ')"><div class="c-icon ' + color + '">' + f.icon + '</div><span class="c-name">' + f.name + '</span><span class="c-tag">' + count + '个</span></div>';
  });
}

function openFolder(idx){
  var f = DATA[idx];
  document.getElementById('folders').style.display='none';
  document.getElementById('detail').style.display='block';
  document.getElementById('backBtn').classList.add('show');
  document.getElementById('crumb').textContent = f.icon + ' ' + f.name;
  var html = '';
  if (f.items.length > 0){
    html += '<div class="sec-title">📄 书签 (' + f.items.length + ')</div>';
    html += '<div class="grid">';
    f.items.forEach(function(bm, i){
      var color = COLORS[i % COLORS.length];
      var nm = bm.name; if (nm.length > 14) nm = nm.slice(0,13) + '…';
      html += '<a class="card" href="' + bm.url + '" target="_blank" rel="noopener noreferrer"><div class="c-icon ' + color + '">' + (nm[0] || '🔗') + '</div><span class="c-name">' + nm + '</span><span class="c-tag">' + bm.domain + '</span></a>';
    });
    html += '</div>';
  }
  f.subs.forEach(function(sub, si){
    html += '<div class="sub-title">' + sub.icon + ' ' + sub.name + ' <span class="sub-count">(' + sub.items.length + ')</span></div>';
    html += '<div class="grid">';
    sub.items.forEach(function(bm, i){
      var color = COLORS[(si*3+i) % COLORS.length];
      var nm = bm.name; if (nm.length > 16) nm = nm.slice(0,15) + '…';
      html += '<a class="card" href="' + bm.url + '" target="_blank" rel="noopener noreferrer"><div class="c-icon ' + color + '">' + (nm[0] || '🔗') + '</div><span class="c-name">' + nm + '</span><span class="c-tag">' + bm.domain + '</span></a>';
    });
    html += '</div>';
  });
  document.getElementById('detailContent').innerHTML = html;
}

function goBack(){
  document.getElementById('folders').style.display='block';
  document.getElementById('detail').style.display='none';
  document.getElementById('backBtn').classList.remove('show');
  document.getElementById('crumb').textContent='';
}

renderFolders();
